<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuckyOS NDN Types Browser Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace;
        background: #f2f4f7;
        color: #111827;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }

      #status {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 700;
      }

      #status[data-state="running"] {
        background: #fef3c7;
        color: #92400e;
      }

      #status[data-state="passed"] {
        background: #dcfce7;
        color: #166534;
      }

      #status[data-state="failed"] {
        background: #fee2e2;
        color: #991b1b;
      }

      pre {
        margin: 20px 0 0;
        padding: 16px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 10px;
        overflow: auto;
        max-height: 60vh;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BuckyOS NDN Types Browser Test</h1>
      <p>
        Runs the same <code>tests/ndn_types_cases.ts</code> suite that jest
        runs in node, but inside a real browser tab. Pass/fail per case is
        reported in <code>#result</code> as JSON for the playwright driver.
      </p>
      <div id="status" data-state="running">Running</div>
      <p id="summary">Preparing test runner...</p>
      <pre id="result">Preparing test...</pre>
    </main>

    <script type="module" src="./ndn_types_runner.mjs"></script>
  </body>
</html>
