<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuckyOS Real Browser Test</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, monospace;
        background: #f2f4f7;
        color: #111827;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        background: #ffffff;
        border: 1px solid #d0d7de;
        border-radius: 12px;
        padding: 20px;
        box-shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0 0 16px;
        line-height: 1.5;
      }

      #status {
        display: inline-block;
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 700;
      }

      #status[data-state="running"] {
        background: #fef3c7;
        color: #92400e;
      }

      #status[data-state="passed"] {
        background: #dcfce7;
        color: #166534;
      }

      #status[data-state="failed"] {
        background: #fee2e2;
        color: #991b1b;
      }

      pre {
        margin: 20px 0 0;
        padding: 16px;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 10px;
        overflow: auto;
        white-space: pre-wrap;
        word-break: break-word;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BuckyOS Real Browser Runtime Test</h1>
      <p>This page runs the browser SDK SSO entry flow from a real browser page.</p>
      <div id="status" data-state="running">Running</div>
      <p><button id="login-button" type="button" disabled>Start SSO Login</button></p>
      <pre id="result">Preparing test...</pre>
    </main>

    <script type="module">
      import { buckyos, RuntimeType } from './browser.mjs';

      const statusNode = document.getElementById('status');
      const resultNode = document.getElementById('result');
      const loginButton = document.getElementById('login-button');

      function setStatus(state, text) {
        statusNode.dataset.state = state;
        statusNode.textContent = text;
      }

      function setResult(value) {
        resultNode.textContent = JSON.stringify(value, null, 2);
        window.__BUCKYOS_REAL_BROWSER_RESULT__ = value;
      }

      function clearCookie(name) {
        document.cookie = `${name}=; Max-Age=0; path=/`;
      }

      async function run() {
        const appId = 'buckycli';
        const summary = {
          origin: window.location.origin,
          href: window.location.href,
          startedAt: new Date().toISOString(),
        };

        try {
          window.localStorage.removeItem('zone_host_name');
          window.localStorage.removeItem(`buckyos.account_info.${appId}`);
          clearCookie(`${appId}_token`);

          await buckyos.initBuckyOS(appId, {
            appId,
            runtimeType: RuntimeType.Browser,
            zoneHost: 'test.buckyos.io',
            defaultProtocol: 'https://',
            autoRenew: false,
          });

          const authClient = new buckyos.AuthClient('test.buckyos.io', appId);
          const ssoLoginUrl = authClient.buildLoginURL();

          loginButton.disabled = false;
          loginButton.addEventListener('click', () => {
            void buckyos.login(false);
          }, { once: true });

          const result = {
            ...summary,
            runtimeType: buckyos.getRuntimeType(),
            zoneHostName: buckyos.getZoneHostName(),
            verifyHubUrl: buckyos.getZoneServiceURL('verify-hub'),
            loginButtonEnabled: !loginButton.disabled,
            ssoLoginUrl,
            currentAccountInfo: buckyos.getAccountInfo(),
            cookie: document.cookie,
          };

          setStatus('passed', 'Passed');
          setResult(result);
        } catch (error) {
          const result = {
            ...summary,
            error: error instanceof Error
              ? {
                  name: error.name,
                  message: error.message,
                  stack: error.stack ?? null,
                }
              : String(error),
          };

          setStatus('failed', 'Failed');
          setResult(result);
        }
      }

      void run();
    </script>
  </body>
</html>
